<div class="pwa">
  @if (!estHome()) {
    <header class="pwa-topbar">
      <button class="pwa-topbar__back" type="button" (click)="retour()" aria-label="Retour">
        <span aria-hidden="true">‹</span>
      </button>
      <h1 class="pwa-topbar__title">{{ titre() }}</h1>
      <span class="pwa-topbar__spacer"></span>
    </header>
  }

  <main class="pwa-content pwa-content--nav" [class.pwa-content--bare]="estHome()">
    <router-outlet></router-outlet>
  </main>

  <!-- Barre de navigation basse persistante -->
  <nav class="pwa-nav">
    <button type="button" class="pwa-nav__item" [class.is-active]="ongletActif() === 'accueil'" (click)="aller('accueil')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      <span>Accueil</span>
    </button>

    <button type="button" class="pwa-nav__item" [class.is-active]="ongletActif() === 'agenda'" (click)="aller('agenda')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Agenda</span>
    </button>

    @if (peutAppeler()) {
      <div class="pwa-nav__fabwrap">
        <button type="button" class="pwa-nav__fab" (click)="faireAppel()" aria-label="Faire l'appel">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        </button>
      </div>
    }

    <button type="button" class="pwa-nav__item" [class.is-active]="ongletActif() === 'messages'" (click)="aller('messages')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8 9 9 0 0 1-3.4-.7L3 20l1.3-4A8.4 8.4 0 0 1 12 3a8.4 8.4 0 0 1 9 8.5z"/></svg>
      <span>Messages</span>
    </button>

    <button type="button" class="pwa-nav__item" [class.is-active]="ongletActif() === 'effectif'" (click)="aller('effectif')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Effectif</span>
    </button>
  </nav>
</div>
