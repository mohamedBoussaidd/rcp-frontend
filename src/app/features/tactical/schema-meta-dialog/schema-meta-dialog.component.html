<div class="form-card meta">

  <div class="form-card__header">
    <h2 class="form-card__title">{{ titre }}</h2>
  </div>

  <div class="form-card__body">
    <div class="form-grid">

      <div class="form-field">
        <label class="form-field__label">Nom <span class="req">*</span></label>
        <input type="text" [(ngModel)]="nom" name="nom"
               placeholder="Ex. Pressing haut 4-3-3" maxlength="120"
               (keydown.enter)="valider()" autofocus />
      </div>

      <div class="form-field">
        <label class="form-field__label">Catégorie</label>
        <input type="text" [(ngModel)]="categorie" name="categorie"
               list="schema-categories" placeholder="Choisir ou saisir…" maxlength="40"
               (keydown.enter)="valider()" />
        <datalist id="schema-categories">
          @for (c of categories; track c) {
            <option [value]="c">{{ label(c) }}</option>
          }
        </datalist>
      </div>

    </div>
  </div>

  <div class="form-card__footer">
    <button type="button" class="btn btn--secondary" (click)="annuler()">Annuler</button>
    <button type="button" class="btn btn--primary" [disabled]="!nom.trim()" (click)="valider()">
      <mat-icon>check</mat-icon>Continuer
    </button>
  </div>

</div>
