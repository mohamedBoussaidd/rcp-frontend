@if (bandeauSimulation()) {
  <div class="bandeau-simulation" role="status">
    <span class="bandeau-simulation__txt">🕓 Vue au {{ dateSimulee() | date:'dd/MM/yyyy' }} — lecture seule (voyage dans la saison)</span>
    <button type="button" class="bandeau-simulation__quit" (click)="quitterSimulation()">Quitter</button>
  </div>
}

@if (auth.currentUser() && !modeMobile()) {
  <div class="app-shell">
    <app-nav-sidebar></app-nav-sidebar>
    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}

@if (auth.currentUser()) {
  <!-- En PWA, la cloche est intégrée dans l'en-tête joueur (mode inline) ; ici uniquement en desktop. -->
  @if (!modeMobile()) {
    <app-notification-bell></app-notification-bell>
  }
  <app-chat-widget></app-chat-widget>
}
