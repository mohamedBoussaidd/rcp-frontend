@if (auth.currentUser() && !modeMobile()) {
  <div class="app-shell">
    <app-nav-sidebar></app-nav-sidebar>
    <main class="app-main">
      <router-outlet></router-outlet>

  </div>
} @else {

  <app-chat-widget></app-chat-widget>
}
