@if (saisonVisible) {
  <button class="context-pill context-pill--saison" (click)="changerSaison()" title="Changer de saison">
    <mat-icon class="context-pill__chev">event</mat-icon>
    <span class="context-pill__content">
      <span class="context-pill__label">Saison</span>
      <span class="context-pill__value">{{ saison.saisonActive()!.libelle }}</span>
    </span>
    <mat-icon class="context-pill__chev">expand_more</mat-icon>
  </button>
}

@if (visible) {
  <button class="context-pill" (click)="estSuperAdmin && retourAdmin()" [title]="estSuperAdmin ? 'Retour administration' : 'Club actif'">
    <span class="context-pill__crest">{{ contexte.clubActif()!.nom.substring(0, 3).toUpperCase() }}</span>
    <span class="context-pill__content">
      <span class="context-pill__label">Club</span>
      <span class="context-pill__value">{{ contexte.clubActif()!.nom }}</span>
    </span>
    <mat-icon class="context-pill__chev">expand_more</mat-icon>
  </button>

  <div class="context-pill">
    <span class="context-pill__content">
      <span class="context-pill__label">Équipe</span>
      @if (contexte.equipesDispo().length > 0) {
        <select class="context-pill__select"
                [value]="contexte.equipesActives().length ? contexte.equipesActives()[0] : ''"
                (change)="onChangerEquipe($any($event.target).value)">
          <option value="">Toutes les équipes</option>
          @for (e of contexte.equipesDispo(); track e.id) {
            <option [value]="e.id">{{ e.nom }}</option>
          }
        </select>
      } @else {
        <span class="context-pill__value">{{ contexte.libelleEquipe() }}</span>
      }
    </span>
  </div>
}
