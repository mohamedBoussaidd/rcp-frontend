<nav class="sidebar">

  <!-- ── Marque ── -->
  <div class="sidebar-brand">
    <mat-icon class="brand-icon">sports_soccer</mat-icon>
    <div class="brand-text">
      <span class="brand-title">RCP</span>
      <span class="brand-sub">Préparateur physique</span>
    </div>
  </div>

  <!-- ── Navigation ── -->
  <ul class="sidebar-nav" (click)="sidebarService.close()">
    @for (item of navItems(); track item.route) {
      <li>
        <a class="nav-item"
           [routerLink]="item.route"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  <!-- ── Pied de sidebar ── -->
  <div class="sidebar-footer">

    @if (user(); as u) {
      <div class="sidebar-user">
        <div class="user-avatar">{{ (u.prenom || u.email).charAt(0).toUpperCase() }}</div>
        <div class="user-meta">
          <span class="user-name">{{ u.prenom }} {{ u.nom }}</span>
          <span class="user-role">{{ roleLabel(u.role) }}</span>
        </div>
      </div>
    }

    <button class="btn-theme" (click)="themeService.toggle()">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      <span>{{ themeService.isDark() ? 'Thème clair' : 'Thème sombre' }}</span>
    </button>

    <button class="btn-logout" (click)="deconnexion()">
      <mat-icon>logout</mat-icon>
      <span>Déconnexion</span>
    </button>

  </div>

</nav>
