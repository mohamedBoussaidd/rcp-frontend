<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A9C4D"/>
      <stop offset="1" stop-color="#0E5837"/>
    </linearGradient>
  </defs>

  <!-- Fond vert terrain, coins arrondis (safe pour maskable) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ballon de foot -->
  <g transform="translate(256 256)">
    <circle r="150" fill="#ffffff"/>
    <!-- pentagone central -->
    <polygon points="0,-46 44,-14 27,38 -27,38 -44,-14" fill="#0B1220"/>
    <!-- coutures vers l'extérieur -->
    <g stroke="#0B1220" stroke-width="10" stroke-linecap="round">
      <line x1="0" y1="-46" x2="0" y2="-118"/>
      <line x1="44" y1="-14" x2="116" y2="-40"/>
      <line x1="27" y1="38" x2="74" y2="104"/>
      <line x1="-27" y1="38" x2="-74" y2="104"/>
      <line x1="-44" y1="-14" x2="-116" y2="-40"/>
    </g>
    <!-- petits pentagones périphériques (accents) -->
    <g fill="#0B1220">
      <polygon points="0,-150 22,-134 14,-108 -14,-108 -22,-134"/>
      <polygon points="140,-30 150,-4 130,16 104,2 108,-26"/>
      <polygon points="92,128 70,146 44,128 54,102 82,102"/>
      <polygon points="-92,128 -82,102 -54,102 -44,128 -70,146"/>
      <polygon points="-140,-30 -108,-26 -104,2 -130,16 -150,-4"/>
    </g>
  </g>
</svg>
