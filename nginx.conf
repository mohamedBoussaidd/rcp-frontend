# Conf interne du conteneur frontend : sert l'app Angular en statique.
# Le routing /api et le TLS sont gérés en amont par le reverse proxy lff-proxy ;
# ce conteneur ne reçoit donc QUE les requêtes de fichiers / routes Angular.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache long pour les assets fingerprintés (outputHashing: all)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA : toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
